name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  rust:
    name: Rust checks
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Verify formatting
        run: cargo fmt --check

      - name: Run clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Run Rust tests
        run: cargo test --all-targets --all-features

  packaging:
    name: Packaging checks
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Verify release versions
        run: node ./scripts/verify-release-version.mjs

      - name: Install npm dependencies without postinstall downloads
        run: npm install --ignore-scripts

      - name: Run npm tests
        run: npm test

      - name: Verify npm package contents
        run: npm pack --dry-run

      - name: Validate POSIX installer syntax
        run: bash -n ./install.sh

      - name: Validate PowerShell installer syntax
        shell: pwsh
        run: |
          [void][scriptblock]::Create((Get-Content -Raw ./install.ps1))
